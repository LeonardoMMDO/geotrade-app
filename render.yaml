services:
  - type: web
    name: geotrade-app-frontend
    env: static
    buildCommand: cd geotrade-app-backend/geotrade-app && npm install && npm run build
    staticPublishPath: geotrade-app-backend/geotrade-app/dist/geotrade-app/browser
    routes:
      - type: rewrite
        source: /*
        destination: /index.html